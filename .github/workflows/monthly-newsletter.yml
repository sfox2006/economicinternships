name: Monthly Young Economist Network Opportunity Roundup Draft

on:
  schedule:
    # 09:00 UTC every Monday; the first-Monday guard below skips other Mondays.
    # = 19:00 Sydney AEST in winter / 20:00 in summer
    - cron: "0 9 * * 1"
  workflow_dispatch:

jobs:
  draft:
    runs-on: ubuntu-latest
    timeout-minutes: 180
    steps:
      - uses: actions/checkout@v4

      - name: Check first Monday
        id: first_monday
        shell: bash
        run: |
          if [[ "${{ github.event_name }}" != "schedule" ]]; then
            echo "run=true" >> "$GITHUB_OUTPUT"
            exit 0
          fi

          day="$(date -u +%d)"
          if (( 10#$day <= 7 )); then
            echo "run=true" >> "$GITHUB_OUTPUT"
          else
            echo "run=false" >> "$GITHUB_OUTPUT"
            echo "::notice::Skipping because this Monday is not the first Monday of the month."
          fi

      - uses: actions/setup-python@v5
        if: steps.first_monday.outputs.run == 'true'
        with:
          python-version: "3.12"

      - name: Install dependencies
        if: steps.first_monday.outputs.run == 'true'
        run: pip install -r requirements.txt

      - name: Run agent
        if: steps.first_monday.outputs.run == 'true'
        env:
          ANTHROPIC_API_KEY: ${{ secrets.ANTHROPIC_API_KEY }}
          GMAIL_CLIENT_ID: ${{ secrets.GMAIL_CLIENT_ID }}
          GMAIL_CLIENT_SECRET: ${{ secrets.GMAIL_CLIENT_SECRET }}
          GMAIL_REFRESH_TOKEN: ${{ secrets.GMAIL_REFRESH_TOKEN }}
          SAM_EMAIL: ${{ secrets.SAM_EMAIL }}
          CLAUDE_MODEL: claude-sonnet-4-6
          PYTHONUTF8: "1"
          CLAUDE_CALL_DELAY_SECONDS: "75"
          MAX_AGENT_STEPS: "90"
          FINALIZE_WITH_STEPS_REMAINING: "12"
          MAX_WEB_FETCHES: "250"
          WEB_FETCH_WARNING_RATIO: "0.85"
          MAX_OUTPUT_TOKENS: "8000"
          MAX_COST_USD: "10.00"
          MAX_RUNTIME_SECONDS: "10200"
          FINALIZE_WITH_SECONDS_REMAINING: "1800"
          INPUT_COST_PER_MTOK: "3.00"
          OUTPUT_COST_PER_MTOK: "15.00"
          MAX_FETCH_CHARS: "1200"
          RATE_LIMIT_RETRY_SECONDS: "95"
          KEEP_RECENT_TOOL_RESULT_MESSAGES: "4"
        run: python agent.py --newsletter economics-careers

      - name: Upload generated spreadsheet as artifact
        if: always() && steps.first_monday.outputs.run == 'true'
        uses: actions/upload-artifact@v4
        with:
          name: economics-careers-spreadsheet
          path: output/*.xlsx
          if-no-files-found: ignore
