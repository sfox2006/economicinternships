name: Monthly Economics Careers Newsletter Draft

on:
  schedule:
    # 09:00 UTC on the 1st of every month
    # = 19:00 Sydney AEST in winter / 20:00 in summer
    - cron: "0 9 1 * *"
  workflow_dispatch:

jobs:
  draft:
    runs-on: ubuntu-latest
    timeout-minutes: 90
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install dependencies
        run: pip install -r requirements.txt

      - name: Run agent
        env:
          ANTHROPIC_API_KEY: ${{ secrets.ANTHROPIC_API_KEY }}
          GMAIL_CLIENT_ID: ${{ secrets.GMAIL_CLIENT_ID }}
          GMAIL_CLIENT_SECRET: ${{ secrets.GMAIL_CLIENT_SECRET }}
          GMAIL_REFRESH_TOKEN: ${{ secrets.GMAIL_REFRESH_TOKEN }}
          SAM_EMAIL: ${{ secrets.SAM_EMAIL }}
          CLAUDE_MODEL: claude-3-5-haiku-20241022
          PYTHONUTF8: "1"
          CLAUDE_CALL_DELAY_SECONDS: "20"
          MAX_AGENT_STEPS: "28"
          MAX_WEB_FETCHES: "75"
          MAX_OUTPUT_TOKENS: "4000"
          MAX_COST_USD: "4.50"
          INPUT_COST_PER_MTOK: "0.80"
          OUTPUT_COST_PER_MTOK: "4.00"
        run: python agent.py --newsletter economics-careers

      - name: Upload generated spreadsheet as artifact
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: economics-careers-spreadsheet
          path: output/*.xlsx
          if-no-files-found: ignore
