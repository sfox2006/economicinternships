name: Monthly Economics Careers Newsletter Draft

on:
  schedule:
    # 09:00 UTC on the 1st of every month
    # = 19:00 Sydney AEST in winter / 20:00 in summer
    - cron: "0 9 1 * *"
  workflow_dispatch:

jobs:
  draft:
    runs-on: ubuntu-latest
    timeout-minutes: 180
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install dependencies
        run: pip install -r requirements.txt

      - name: Run agent
        env:
          ANTHROPIC_API_KEY: ${{ secrets.ANTHROPIC_API_KEY }}
          GMAIL_CLIENT_ID: ${{ secrets.GMAIL_CLIENT_ID }}
          GMAIL_CLIENT_SECRET: ${{ secrets.GMAIL_CLIENT_SECRET }}
          GMAIL_REFRESH_TOKEN: ${{ secrets.GMAIL_REFRESH_TOKEN }}
          SAM_EMAIL: ${{ secrets.SAM_EMAIL }}
          CLAUDE_MODEL: claude-sonnet-4-6
          PYTHONUTF8: "1"
          CLAUDE_CALL_DELAY_SECONDS: "75"
          MAX_AGENT_STEPS: "65"
          MAX_WEB_FETCHES: "250"
          MAX_OUTPUT_TOKENS: "8000"
          MAX_COST_USD: "10.00"
          INPUT_COST_PER_MTOK: "3.00"
          OUTPUT_COST_PER_MTOK: "15.00"
          MAX_FETCH_CHARS: "1200"
          RATE_LIMIT_RETRY_SECONDS: "95"
          KEEP_RECENT_TOOL_RESULT_MESSAGES: "4"
        run: python agent.py --newsletter economics-careers

      - name: Upload generated spreadsheet as artifact
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: economics-careers-spreadsheet
          path: output/*.xlsx
          if-no-files-found: ignore
